<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> SORRY </title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, rgb(255, 102, 102), rgb(255, 179, 255), rgb(153, 204, 255));
            color: white;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            color: rgb(255, 230, 230);
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            font-style: italic;
            margin-bottom: 20px;
        }
        .love {
            font-size: 3em;
            color: rgb(255, 51, 102);
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255, 51, 102, 0.8); }
            to { text-shadow: 0 0 20px rgba(255, 51, 102, 1); }
        }
        button {
            padding: 12px 25px;
            border: none;
            background: rgb(255, 51, 102);
            color: white;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: rgb(255, 102, 153);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕🎉 Happy Birthday, Suhani 🎂🎈💕</h1>


        
        <button onclick="window.location.href='https://www.instagram.com/monty_2626/'">Let's Talk</button>
    </div>
</body>
</html>

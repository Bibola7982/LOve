<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .chat-container {
            width: 80%;
            max-width: 600px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .chat-box {
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }

        .input-box {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .input-box input {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .input-box button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .input-box button:hover {
            background-color: #0056b3;
        }

        .message {
            margin: 5px 0;
        }

        .user-message {
            color: blue;
        }

        .bot-message {
            color: green;
        }

        .message span {
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Live Chat</h2>
    <div id="chatBox" class="chat-box"></div>
    <div class="input-box">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

<script>
    // Your Firebase configuration
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Function to send a message
    function sendMessage() {
        const messageInput = document.getElementById("messageInput");
        const message = messageInput.value.trim();
        
        if (message !== "") {
            const timeStamp = new Date().toLocaleString();
            const newMessage = {
                message: message,
                timeStamp: timeStamp,
                sender: "user"
            };

            // Save message to Firebase
            database.ref('messages').push(newMessage).then(() => {
                messageInput.value = "";
            }).catch((error) => {
                console.error("Error sending message: ", error);
            });
        }
    }

    // Function to handle pressing "Enter" key to send message
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    }

    // Function to load messages from Firebase
    function loadMessages() {
        const chatBox = document.getElementById("chatBox");

        // Listen to changes in Firebase database
        database.ref('messages').on('child_added', function(snapshot) {
            const messageData = snapshot.val();
            const newMessage = document.createElement("div");
            newMessage.classList.add("message");

            if (messageData.sender === "user") {
                newMessage.classList.add("user-message");
                newMessage.innerHTML = `<strong>You:</strong> ${messageData.message} <span>${messageData.timeStamp}</span>`;
            } else {
                newMessage.classList.add("bot-message");
                newMessage.innerHTML = `<strong>Bot:</strong> ${messageData.message} <span>${messageData.timeStamp}</span>`;
            }

            chatBox.appendChild(newMessage);
            chatBox.scrollTop = chatBox.scrollHeight;  // Scroll to the bottom
        });
    }

    // Load the initial messages
    loadMessages();
</script>

</body>
</html>
